name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Backend unit + integration tests
  # -------------------------------------------------------------------------
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: smart_attendance_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 3000
          API_PREFIX: api/v1
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: smart_attendance_test
          DB_USER: postgres
          DB_PASS: testpassword
          DB_SSL: 'false'
          DB_POOL_SIZE: '5'
          TYPEORM_LOGGING: 'false'
          TYPEORM_SYNCHRONIZE: 'false'
          TYPEORM_MIGRATIONS_RUN: 'true'
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASS: ''
          REDIS_DB: '0'
          REDIS_KEY_PREFIX: 'sa:'
          JWT_SECRET: test-secret-for-ci-minimum-64-characters-long-padding-here-abc123
          JWT_ACCESS_EXPIRES: 15m
          JWT_REFRESH_EXPIRES: 7d
          SEED_ADMIN_EMAIL: admin@test.com
          SEED_ADMIN_PASSWORD: TestAdmin@123
          RATE_LIMIT_TTL: '60'
          RATE_LIMIT_MAX: '100'
          RATE_LIMIT_CHECKIN_PER_DAY: '2'
          GPS_MAX_ACCURACY_METERS: '50'
          LOG_LEVEL: error
          LOG_FORMAT: json
        run: npm run test -- --ci --coverage --forceExit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend
          fail_ci_if_error: false

  # -------------------------------------------------------------------------
  # Job 2: Web PWA type-check + build
  # -------------------------------------------------------------------------
  test-web:
    name: Test Web PWA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Type check + production build
        working-directory: web
        env:
          VITE_API_URL: http://localhost:3000/api/v1
          VITE_WS_URL: http://localhost:3000
          VITE_APP_NAME: Smart Attendance
          VITE_APP_VERSION: 1.0.0
          VITE_PWA_NAME: Smart Attendance
          VITE_PWA_SHORT_NAME: SA
          VITE_PWA_THEME_COLOR: '#49B7C3'
        run: npm run build

  # -------------------------------------------------------------------------
  # Job 3: Build Docker images and push to GHCR (main branch only)
  # -------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Images
    needs: [test-backend, test-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for backend image
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for web image
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          dockerfile: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
